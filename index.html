<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Discord</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #313338; }
        #cloud-frame { width: 100%; height: 100%; border: none; }
        #pointer {
            position: absolute; width: 20px; height: 20px;
            background: rgba(88, 101, 242, 0.8); border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
        }
        #setup { position: absolute; top: 10px; left: 10px; color: #aaa; font-family: sans-serif; font-size: 10px; z-index: 10001; }
    </style>
</head>
<body>
    <div id="setup">ID: <span id="my-id">...</span></div>
    <div id="pointer"></div>

    <iframe id="cloud-frame" src="/discord-proxy/app"></iframe>

    <script>
        const peer = new Peer();
        const pointer = document.getElementById('pointer');
        
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('connection', conn => {
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                if (data.type === 'start') {
                    const el = document.elementFromPoint(x, y);
                    if (el) el.click();
                }
            });
        });
    </script>
</body>
</html>
