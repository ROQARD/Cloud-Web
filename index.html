<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Web Interface</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; font-family: system-ui; overflow: hidden; }
        #pointer {
            position: absolute;
            width: 20px; height: 20px;
            background: rgba(255, 0, 0, 0.5);
            border: 2px solid red;
            border-radius: 50%;
            pointer-events: none; /* Allows clicks to pass through to elements below */
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        .setup-overlay { padding: 20px; background: white; border: 2px solid black; position: absolute; top: 10%; left: 10%; z-index: 10000; }
    </style>
</head>
<body>
    <div id="pointer"></div>
    <div id="setup" class="setup-overlay">
        <h2>Cloud Controller Setup</h2>
        <p>ID: <b id="my-id">Connecting...</b></p>
        <p>1. Open <b>/remote.html</b> on your phone.<br>2. Enter this ID and connect.</p>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
        <button onclick="alert('Button Clicked via Cloud!')" style="padding: 20px; font-size: 20px;">Touch Me From Phone</button>
    </div>

    <script>
        const peer = new Peer();
        const pointer = document.getElementById('pointer');
        const setup = document.getElementById('setup');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('connection', conn => {
            setup.style.display = 'none';
            
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                
                // Move the visual pointer
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                // Simulate interaction
                if (data.type === 'start' || data.type === 'move') {
                    const el = document.elementFromPoint(x, y);
                    if (data.type === 'start' && el) el.click(); 
                }
            });
        });
    </script>
</body>
</html>
