<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Web Interface</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
        
        /* The Website in the Cloud */
        #cloud-site {
            width: 100%;
            height: 100%;
            border: none;
        }

        #pointer {
            position: absolute;
            width: 25px; height: 25px;
            background: rgba(0, 112, 243, 0.4);
            border: 2px solid #0070f3;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        #setup { 
            position: absolute; top: 20px; left: 20px; 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10001; 
        }
    </style>
</head>
<body>

    <div id="setup">
        <b>ID:</b> <span id="my-id">Connecting...</span>
    </div>

    <div id="pointer"></div>

    <iframe id="cloud-site" src="https://discord.com/login"></iframe>

    <script>
        const peer = new Peer();
        const pointer = document.getElementById('pointer');
        const setup = document.getElementById('setup');
        const iframe = document.getElementById('cloud-site');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('connection', conn => {
            setup.style.opacity = "0.3"; // Dim the setup box once connected
            
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                if (data.type === 'start') {
                    // This attempts to click the element at the coordinate
                    // Note: Browser security may limit clicking inside some iframes
                    const el = document.elementFromPoint(x, y);
                    if (el) el.click();
                }
            });
        });
    </script>
</body>
</html>
