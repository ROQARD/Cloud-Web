<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cloud Discord</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; background: #313338; 
        }
        
        /* The Container */
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
            touch-action: none; /* Prevents Safari from interfering with touches */
        }

        /* The Discord Frame */
        #browser {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto; /* Allows direct interaction */
        }

        /* Overlay to capture touches if direct interaction is blocked by Safari security */
        #touch-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="touch-layer"></div>
        <iframe id="browser" src="/discord-app/app"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('browser');
        const touchLayer = document.getElementById('touch-layer');

        // This function translates your finger touch into a click inside the cloud site
        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const x = touch.clientX;
            const y = touch.clientY;

            // We hide the layer for a millisecond to find what's underneath
            touchLayer.style.pointerEvents = 'none';
            const element = document.elementFromPoint(x, y);
            
            if (element) {
                // Simulate a real touch sequence
                element.dispatchEvent(new MouseEvent('mousedown', {bubbles: true, clientX: x, clientY: y}));
                element.click();
                element.dispatchEvent(new MouseEvent('mouseup', {bubbles: true, clientX: x, clientY: y}));
            }
            
            touchLayer.style.pointerEvents = 'auto';
        }

        touchLayer.addEventListener('touchstart', handleTouch, {passive: false});
    </script>
</body>
</html>
