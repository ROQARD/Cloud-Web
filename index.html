<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Discord</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #313338; }
        #browser { width: 100%; height: 100%; border: none; }
        #pointer {
            position: absolute; width: 25px; height: 25px;
            background: rgba(88, 101, 242, 0.6); border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="pointer"></div>
    <iframe id="browser" src="/discord-app/app"></iframe>

    <script>
        // We set a FIXED ID here so you never have to type it
        const peer = new Peer('my-private-cloud-session-123'); 
        const pointer = document.getElementById('pointer');
        
        peer.on('open', id => console.log('Cloud is ready at ID:', id));

        peer.on('connection', conn => {
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                if (data.type === 'start') {
                    const el = document.elementFromPoint(x, y);
                    if (el) el.click();
                }
            });
        });
    </script>
</body>
</html>
