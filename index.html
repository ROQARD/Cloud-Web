<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Discord</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #313338; }
        
        /* Using an Object tag + Proxy to force Discord to load */
        #cloud-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #pointer {
            position: absolute;
            width: 20px; height: 20px;
            background: rgba(88, 101, 242, 0.7);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        #setup { 
            position: absolute; top: 10px; left: 10px; 
            background: #2b2d31; color: white; padding: 8px; 
            border-radius: 4px; font-family: sans-serif; font-size: 10px;
            border: 1px solid #4e5058; z-index: 10001;
        }
    </style>
</head>
<body>

    <div id="setup">ID: <span id="my-id">...</span></div>
    <div id="pointer"></div>

    <iframe id="cloud-frame" src="https://discord.com/app"></iframe>

    <script>
        const peer = new Peer();
        const pointer = document.getElementById('pointer');
        const frame = document.getElementById('cloud-frame');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('connection', conn => {
            document.getElementById('setup').style.opacity = "0.1";
            
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                if (data.type === 'start') {
                    // This creates a virtual click at the location
                    const clickEvent = new MouseEvent('click', {
                        view: window,
                        bubbles: true,
                        cancelable: true,
                        clientX: x,
                        clientY: y
                    });
                    document.elementFromPoint(x, y).dispatchEvent(clickEvent);
                }
            });
        });
    </script>
</body>
</html>
