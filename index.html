<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Interface - Discord</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #313338; }
        
        /* The Website Container */
        #browser-container {
            width: 100%; height: 100%; border: none;
        }

        #pointer {
            position: absolute; width: 20px; height: 20px;
            background: rgba(88, 101, 242, 0.6); /* Discord Blue */
            border: 2px solid white; border-radius: 50%;
            pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: 0.05s linear;
        }

        #setup-box { 
            position: absolute; top: 10px; left: 10px; 
            background: #2b2d31; color: white; padding: 10px; 
            border-radius: 5px; z-index: 10001; font-family: sans-serif;
            font-size: 12px; border: 1px solid #4e5058;
        }
    </style>
</head>
<body>

    <div id="setup-box">ID: <span id="my-id">...</span></div>
    <div id="pointer"></div>

    <iframe id="browser-container" src="https://discord.com/app"></iframe>

    <script>
        const peer = new Peer();
        const pointer = document.getElementById('pointer');
        const iframe = document.getElementById('browser-container');

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        peer.on('connection', conn => {
            document.getElementById('setup-box').style.opacity = "0.2";
            
            conn.on('data', data => {
                const x = data.x * window.innerWidth;
                const y = data.y * window.innerHeight;
                
                pointer.style.left = x + 'px';
                pointer.style.top = y + 'px';

                if (data.type === 'start') {
                    // Clicks on the main page
                    const el = document.elementFromPoint(x, y);
                    if (el) el.click();

                    // If you want to interact INSIDE the iframe, 
                    // the iframe must be from the same domain.
                    // Due to security, true "Remote Control" of 3rd party sites
                    // usually requires a Proxy server.
                }
            });
        });
    </script>
</body>
</html>
