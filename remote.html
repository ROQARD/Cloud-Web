<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; height: 100vh; display: flex; flex-direction: column; color: white; font-family: sans-serif; }
        #pad { flex-grow: 1; margin: 10px; border: 2px solid #5865f2; border-radius: 12px; touch-action: none; display: flex; align-items: center; justify-content: center; }
        .bar { padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; }
    </style>
</head>
<body>
    <div class="bar">
        <input type="text" id="target" placeholder="Enter ID">
        <button onclick="connect()" style="padding: 10px; border-radius: 8px; background: #5865f2; color: white; border: none;">Link</button>
    </div>
    <div id="pad">TOUCHPAD</div>
    <script>
        const peer = new Peer();
        let conn;
        function connect() {
            conn = peer.connect(document.getElementById('target').value);
        }
        const pad = document.getElementById('pad');
        pad.addEventListener('touchmove', (e) => {
            if(!conn) return;
            const t = e.touches[0];
            const r = pad.getBoundingClientRect();
            conn.send({ type: 'move', x: (t.clientX - r.left)/r.width, y: (t.clientY - r.top)/r.height });
        });
        pad.addEventListener('touchstart', (e) => {
            if(!conn) return;
            const t = e.touches[0];
            const r = pad.getBoundingClientRect();
            conn.send({ type: 'start', x: (t.clientX - r.left)/r.width, y: (t.clientY - r.top)/r.height });
        });
    </script>
</body>
</html>
