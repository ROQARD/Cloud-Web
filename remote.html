<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Cloud Remote</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #1e1f22; color: white; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; display: flex; flex-direction: column; }
        .nav { padding: 10px; display: flex; gap: 5px; background: #2b2d31; }
        input { flex: 1; padding: 10px; border-radius: 4px; border: none; background: #1e1f22; color: white; }
        button { padding: 10px; background: #5865f2; border: none; border-radius: 4px; color: white; }
        #trackpad { flex-grow: 1; margin: 10px; border: 2px dashed #4e5058; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #4e5058; }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="target-id" placeholder="Enter ID">
        <button id="connect">Connect</button>
    </div>
    
    <div id="trackpad">TOUCH TO MOVE CURSOR</div>

    <script>
        const peer = new Peer();
        let conn = null;

        document.getElementById('connect').onclick = () => {
            conn = peer.connect(document.getElementById('target-id').value);
            conn.on('open', () => {
                document.getElementById('trackpad').innerText = "CONNECTED - CONTROL CLOUD";
                document.getElementById('trackpad').style.borderColor = "#5865f2";
            });
        };

        const pad = document.getElementById('trackpad');
        const handleTouch = (e, type) => {
            if (!conn) return;
            const touch = e.touches[0];
            const rect = pad.getBoundingClientRect();
            conn.send({
                type: type,
                x: (touch.clientX - rect.left) / rect.width,
                y: (touch.clientY - rect.top) / rect.height
            });
        };

        pad.addEventListener('touchstart', e => handleTouch(e, 'start'));
        pad.addEventListener('touchmove', e => handleTouch(e, 'move'));
    </script>
</body>
</html>
