<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Touch Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; height: 100vh; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #trackpad { width: 100%; height: 80%; background: #222; display: flex; align-items: center; justify-content: center; border-top: 1px solid #333; }
        .ui { height: 20%; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; }
        button { padding: 12px; background: #0070f3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="ui">
        <input type="text" id="target-id" placeholder="Enter Cloud ID">
        <button id="connect">Connect</button>
    </div>
    <div id="trackpad">TOUCH TO CONTROL CLOUD</div>

    <script>
        const peer = new Peer();
        let conn = null;

        document.getElementById('connect').onclick = () => {
            conn = peer.connect(document.getElementById('target-id').value);
            conn.on('open', () => {
                document.getElementById('trackpad').innerText = "CONNECTED";
                document.getElementById('trackpad').style.background = "#004a10";
            });
        };

        const sendTouch = (e, type) => {
            if (!conn) return;
            const touch = e.touches[0];
            conn.send({
                type: type,
                x: touch.clientX / window.innerWidth,
                y: touch.clientY / (window.innerHeight * 0.8) // Adjust for the 80% trackpad height
            });
        };

        const pad = document.getElementById('trackpad');
        pad.addEventListener('touchstart', e => sendTouch(e, 'start'));
        pad.addEventListener('touchmove', e => sendTouch(e, 'move'));
    </script>
</body>
</html>
