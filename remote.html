<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Remote</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; touch-action: none; }
        #pad { flex: 1; margin: 20px; border: 2px solid #5865f2; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #5865f2; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="pad">AUTO-CONNECTING...</div>

    <script>
        const peer = new Peer();
        let conn = null;

        // Automatically try to connect to the Static ID we set in index.html
        peer.on('open', () => {
            conn = peer.connect('my-private-cloud-session-123');
            conn.on('open', () => {
                document.getElementById('pad').innerText = "CONNECTED & READY";
            });
        });

        const pad = document.getElementById('pad');
        const send = (e, type) => {
            if (!conn) return;
            e.preventDefault();
            const t = e.touches[0];
            const r = pad.getBoundingClientRect();
            conn.send({
                type: type,
                x: (t.clientX - r.left) / r.width,
                y: (t.clientY - r.top) / r.height
            });
        };

        pad.addEventListener('touchstart', e => send(e, 'start'), {passive: false});
        pad.addEventListener('touchmove', e => send(e, 'move'), {passive: false});
    </script>
</body>
</html>
